<!DOCTYPE html>
<html>
<head>
<title>Shapes</title>
<style>
body{
    background: #eee;
}

div{
    display:inline-block;
    margin:20px;
    width:150px;
    height: 150px;
    text-align:center;
    line-height:150px;
    color: white;
}

.leaf{
    background: skyblue;
    border-radius:0 100% 0 100%;
}
.halfoval{
    width:300px;
    background: blue;
    border-radius:00 150px 150px;
}

.oval{
    width:300px;
    background: orange;
    border-radius: 50%;
}

.twist{
    width:300px;
    background: green;
    border-radius:0 100% 0 100%;
    transform:rotate(10deg);
}

.twist2{
    width:300px;
    background: purple;
    border-radius:0 50% 0 50%;
}

.circle{
    background: rgb(225, 12, 189);
    border-radius: 50%;
}

.tab{
    background: skyblue; 
    border-radius:0 0 50% 50%;
}

.three{
    background: blue;
    border-radius:0 50% 50% 50%;
}
</style>
</head>

<body>
    <div class="leaf">Leaf</div>
    <div class="halfoval">Half Oval</div>
    <div class="oval">Oval</div>
    <div class="twist">Twist</div>
    <br><br>
    <div class="twist2">Twist Two</div>
    <div class="circle">Circle</div>
    <div class="tab">Tab</div>
    <div class="three">Three Sided</div>

</body>
</html>
