<!DOCTYPE html>
<html>
<head>
<style>
.logo{
    width:200px;
    height:200px;
    background:linear-gradient(45deg,#feda75,#fa7e1e,#d62976,#962fbf,#4f5bd5);
    border-radius:45px;
    position:relative;
    margin:50px auto;
}

.camera{
    width:100px;
    height:100px;
    border:10px solid white;
    border-radius:50%;
    position:absolute;
    top:40px;
    left:40px;
}

.dot{
    width:20px;
    height:20px;
    background:white;
    border-radius:50%;
    position:absolute;
    top:35px;
    right:35px;
}

.border{
    width:140px;
    height:140px;
    border:10px solid white;
    border-radius:35px;
    position:absolute;
    top:20px;
    left:20px;
}
</style>
</head>
<body>

<div class="logo">
    <div class="border"></div>
    <div class="camera"></div>
    <div class="dot"></div>
</div>

</body>
</html>
